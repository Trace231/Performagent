
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小星 · 演唱会助手 · 南门东开</title>
    <!-- 字体 & 图标库 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..800;1,14..32,400..800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8R9Jx8i8D4Q8Vf4Yk8xg0Q4x7rH6g3A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- 高德地图 JSLoader (后续动态加载) -->
    <style>
        :root {
            --bg1: #070b25;
            --bg2: #1b2e6d;
            --bg3: #3b2a86;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-strong: rgba(255, 255, 255, 0.12);
            --text-main: #1e1b2e;
            --text-soft: #4a4560;
            --text-main-on-dark: #eef1ff;
            --text-soft-on-dark: #b8bfdc;
            --accent1: #7c3aed;
            --accent2: #22d3ee;
            --accent3: #6366f1;
            --danger: #fb7185;
            --success: #4ade80;
        }

        * {
            box-sizing: border-box;
        }
        a, button:not(:disabled), [role="button"]:not([aria-disabled="true"]), .ghost-btn, .agent-mode-btn, .quick-btn:not(:disabled), .nav-btn, .food-route-btn, .send-btn:not(:disabled), .agent-option-btn:not(:disabled) {
            cursor: url('cursor.png') 4 4, pointer;
        }
        a:active, button:active, [role="button"]:active, .ghost-btn:active, .agent-mode-btn:active, .quick-btn:active, .nav-btn:active, .food-route-btn:active, .send-btn:active, .agent-option-btn:active {
            cursor: url('cursor-pressed.png') 4 4, pointer;
        }
        input, textarea {
            cursor: text;
        }

        html, body {
            margin: 0;
            height: 100%;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            background: url('04-2.svg') center center / cover no-repeat fixed;
            background-color: var(--bg1);
            overflow: hidden;
            cursor: url('cursor.png') 4 4, auto;
        }
        body.cursor-pressed {
            cursor: url('cursor-pressed.png') 4 4, pointer !important;
        }
        body.cursor-pressed input, body.cursor-pressed textarea {
            cursor: text !important;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            width: 38vmax;
            height: 38vmax;
            border-radius: 50%;
            filter: blur(68px);
            opacity: 0.45;
            pointer-events: none;
            z-index: 0;
            animation: glowFloat 16s ease-in-out infinite alternate;
        }
        body::before {
            top: -10vmax;
            left: -8vmax;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.8), transparent 70%);
        }
        body::after {
            right: -10vmax;
            bottom: -12vmax;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.75), transparent 70%);
            animation-delay: 3s;
        }

        @keyframes glowFloat {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(3vmax, -2vmax) scale(1.08); }
        }

        .app-shell {
            position: relative;
            z-index: 10;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 20px;
            padding: 20px 20px 10px 20px;
        }

        /* ========= 左侧聊天卡片 (原框架风格，深色块上保留浅色字) ========= */
        .chat-card {
            width: min(100%, 440px);
            flex-shrink: 0;
            align-self: stretch;
            height: min(calc(100vh - 30px), 820px);
            min-height: 0;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: linear-gradient(130deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.06));
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 28px 60px rgba(3, 5, 18, 0.5), 0 0 40px rgba(139,92,246,0.06), inset 0 1px 0 rgba(255, 255, 255, 0.28);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text-main-on-dark);
        }
        .chat-card .status { color: var(--text-soft-on-dark); }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.16);
            background: linear-gradient(180deg, rgba(12,16,36,0.5), rgba(7,12,27,0.4));
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-wrap {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 22px rgba(139, 92, 246, 0.4);
            animation: assistantPulse 3s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .avatar-wrap:hover { transform: scale(1.05); }
        .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transform-origin: center 70%;
        }
        .avatar-wrap.avatar-shake img {
            animation: avatarShake 0.55s ease-in-out;
        }
        @keyframes avatarShake {
            0%, 100% { transform: rotate(0deg); }
            12% { transform: rotate(-14deg); }
            24% { transform: rotate(14deg); }
            36% { transform: rotate(-10deg); }
            48% { transform: rotate(10deg); }
            60% { transform: rotate(-5deg); }
            72% { transform: rotate(5deg); }
            84% { transform: rotate(-2deg); }
        }
        .title { font-size: 1rem; font-weight: 800; margin: 0 0 4px; text-shadow: 0 1px 2px rgba(0,0,0,0.08); }
        .status {
            margin: 0; color: var(--text-soft); font-size: 0.82rem;
            display: flex; align-items: center; gap: 8px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--success); box-shadow: 0 0 10px var(--success);
        }
        .ghost-btn {
            border: 1px solid rgba(139,92,246,0.4); background: linear-gradient(135deg, rgba(139,92,246,0.22), rgba(6,182,212,0.12));
            color: #ffffff; text-shadow: 0 1px 3px rgba(0,0,0,0.4), 0 0 1px rgba(0,0,0,0.3); padding: 8px 14px; border-radius: 12px;
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            box-shadow: 0 2px 8px rgba(31,18,63,0.2);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ghost-btn:hover {
            border-color: rgba(139,92,246,0.6);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(139,92,246,0.3);
        }
        .header-btns { display: flex; align-items: center; gap: 8px; }
        .agent-mode-btn {
            border: 1px solid rgba(139,92,246,0.4); background: linear-gradient(135deg, rgba(139,92,246,0.22), rgba(6,182,212,0.12));
            color: #ffffff; text-shadow: 0 1px 3px rgba(0,0,0,0.4), 0 0 1px rgba(0,0,0,0.3); padding: 8px 14px; border-radius: 12px;
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            box-shadow: 0 2px 8px rgba(31,18,63,0.2);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .agent-mode-btn:hover {
            border-color: rgba(139,92,246,0.6);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(139,92,246,0.25);
        }
        .agent-mode-btn.active {
            border-color: rgba(139,92,246,0.75);
            background: linear-gradient(135deg, rgba(139,92,246,0.35), rgba(6,182,212,0.2));
            color: #ffffff; text-shadow: 0 1px 3px rgba(0,0,0,0.4), 0 0 1px rgba(0,0,0,0.3);
            box-shadow: 0 0 20px rgba(139,92,246,0.4), 0 4px 16px rgba(139,92,246,0.3);
        }
        .agent-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }
        .agent-option-btn {
            position: relative;
            overflow: visible;
            padding: 12px 16px 12px 20px;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.4;
            text-align: left;
            cursor: pointer;
            color: #ffffff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4), 0 0 1px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, rgba(139,92,246,0.18), rgba(6,182,212,0.08));
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 0 24px rgba(139,92,246,0.06),
                        0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            animation: agentOptionIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        .agent-option-btn::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 55%;
            border-radius: 2px;
            background: linear-gradient(180deg, rgba(139,92,246,0.9), rgba(6,182,212,0.8));
            opacity: 0.7;
        }
        .agent-option-btn:nth-child(1) { animation-delay: 0.05s; }
        .agent-option-btn:nth-child(2) { animation-delay: 0.1s; }
        .agent-option-btn:nth-child(3) { animation-delay: 0.15s; }
        .agent-option-btn:nth-child(4) { animation-delay: 0.2s; }
        .agent-option-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            border-color: rgba(139,92,246,0.5);
            box-shadow: 0 8px 28px rgba(139,92,246,0.22),
                        0 0 48px rgba(6,182,212,0.12),
                        inset 0 0 24px rgba(139,92,246,0.08);
        }
        .agent-option-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        .agent-option-btn:disabled {
            cursor: default;
            opacity: 0.75;
        }
        @keyframes agentOptionIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .agent-option-btn .ripple {
            position: absolute;
            width: 8px;
            height: 8px;
            margin-left: -4px;
            margin-top: -4px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(139,92,246,0.6));
            transform: scale(0);
            animation: rippleExpand 0.6s ease-out forwards;
            pointer-events: none;
        }
        .agent-option-btn .burst-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            margin-left: -4px;
            margin-top: -4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.98), rgba(139,92,246,0.4));
            box-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(6,182,212,0.35);
        }
        @keyframes rippleExpand {
            to { transform: scale(18); opacity: 0; }
        }
        @keyframes burstOut {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            70% {
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0.2);
                opacity: 0;
            }
        }

        .api-section {
            padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(9,13,33,0.3); display: none; /* 默认隐藏，可通过JS显示 */
        }

        .messages {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.35) transparent;
        }
        .messages::-webkit-scrollbar { width: 8px; }
        .messages::-webkit-scrollbar-thumb { border-radius: 8px; background: rgba(255,255,255,0.25); }

        .msg-row { display: flex; max-width: 100%; }
        .msg-row.assistant { justify-content: flex-start; animation: fadeInUpLeft 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) both; }
        .msg-row.user { justify-content: flex-end; animation: fadeInUpRight 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) both; }
        .msg-bubble {
            max-width: 82%; padding: 12px 14px; line-height: 1.55; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2); word-break: break-word;
            transition: box-shadow 0.5s ease, filter 0.5s ease;
        }
        .assistant .msg-bubble {
            background: linear-gradient(rgba(8,12,30,0.9), rgba(8,12,30,0.9)) padding-box,
                        linear-gradient(135deg, rgba(139,92,246,0.9), rgba(6,182,212,0.9)) border-box;
            border: 1px solid transparent; box-shadow: 0 0 20px rgba(139,92,246,0.2);
        }
        .user .msg-bubble {
            background: linear-gradient(rgba(13,18,39,0.9), rgba(13,18,39,0.9)) padding-box,
                        linear-gradient(135deg, rgba(6,182,212,0.95), rgba(236,72,153,0.95)) border-box;
            border: 1px solid transparent; box-shadow: 0 0 20px rgba(6,182,212,0.18);
        }

        .typing { display: inline-flex; align-items: center; gap: 5px; }
        .typing span {
            width: 6px; height: 6px; border-radius: 50%; background: #cdd3ff;
            display: inline-block; animation: dotBounce 1s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: 0.14s; }
        .typing span:nth-child(3) { animation-delay: 0.28s; }

        .msg-bubble.streaming {
            animation: streamingPulse 2.5s ease-in-out infinite, streamingShine 3s ease-in-out infinite;
        }
        .msg-bubble .stream-content { display: inline; }
        .typing-cursor {
            display: inline-block;
            margin-left: 4px;
            vertical-align: text-bottom;
        }
        .typing-cursor img {
            display: block;
            height: 1.2em;
            width: auto;
            min-width: 14px;
            max-height: 26px;
            object-fit: contain;
            vertical-align: text-bottom;
            animation: cursorGlow 1.6s ease-in-out infinite;
        }
        @keyframes cursorGlow {
            0%, 100% {
                filter: drop-shadow(0 0 4px rgba(160,100,220,0.5)) drop-shadow(0 0 8px rgba(255,200,50,0.25));
                opacity: 1;
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 0 8px rgba(160,100,220,0.85)) drop-shadow(0 0 14px rgba(255,200,50,0.5));
                opacity: 0.95;
                transform: scale(1.06);
            }
        }

        .quick-panel {
            border-top: 1px solid rgba(255,255,255,0.14); padding: 12px 16px;
            display: flex; flex-wrap: wrap; gap: 8px;
            background: linear-gradient(180deg, rgba(10,12,28,0.4), rgba(7,10,24,0.35));
        }
        .quick-btn {
            border: 1px solid rgba(139,92,246,0.35); background: linear-gradient(135deg, rgba(139,92,246,0.28), rgba(6,182,212,0.15));
            color: #ffffff; text-shadow: 0 1px 3px rgba(0,0,0,0.4), 0 0 1px rgba(0,0,0,0.3); border-radius: 999px; padding: 9px 14px;
            font-size: 0.8rem; font-weight: 500; cursor: pointer;
            box-shadow: 0 2px 8px rgba(31,18,63,0.15);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .quick-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(6,182,212,0.6);
            box-shadow: 0 6px 20px rgba(6,182,212,0.3);
        }
        .quick-btn:active { transform: scale(0.98); }

        .composer {
            border-top: 1px solid rgba(255,255,255,0.18); padding: 14px 16px 16px;
            display: flex; gap: 10px; background: linear-gradient(180deg, rgba(12,16,36,0.5), rgba(7,10,24,0.45));
            box-shadow: 0 -4px 20px rgba(139,92,246,0.08);
        }
        .input {
            flex: 1; border: 1px solid rgba(255,255,255,0.28); border-radius: 14px;
            background: rgba(255,255,255,0.12); color: #ffffff; padding: 12px 14px;
            outline: none; transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.08), 0 0 0 1px rgba(255,255,255,0.06);
        }
        .input::placeholder { color: rgba(255,255,255,0.55); }
        .input:focus {
            border-color: rgba(139,92,246,0.75);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.22), inset 0 1px 2px rgba(0,0,0,0.06);
            background: rgba(255,255,255,0.14);
        }
        .send-btn {
            width: 52px; height: 52px; border: 1px solid rgba(255,255,255,0.36); border-radius: 50%;
            cursor: pointer; position: relative; isolation: isolate; padding: 0;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            background: radial-gradient(circle at 28% 26%, rgba(255,255,255,0.45), transparent 52%),
                        linear-gradient(140deg, #8b5cf6 0%, #7c3aed 42%, #06b6d4 100%);
            box-shadow: 0 10px 24px rgba(31,18,63,0.5), 0 0 20px rgba(6,182,212,0.15), 0 0 0 1px rgba(255,255,255,0.1) inset;
            transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
        }
        .send-btn::before {
            content: "";
            position: absolute; inset: 5px; border-radius: 50%;
            background: linear-gradient(160deg, rgba(255,255,255,0.3), rgba(255,255,255,0));
            pointer-events: none; z-index: -1;
        }
        .send-btn::after {
            content: "";
            position: absolute; inset: -1px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.26);
            box-shadow: 0 0 18px rgba(6,182,212,0.22);
            opacity: 0; transform: scale(0.88);
            transition: opacity 0.22s ease, transform 0.22s ease;
            pointer-events: none;
        }
        .send-btn img {
            width: 42px;
            height: 42px;
            object-fit: contain;
            object-position: center;
            transform: rotate(-8deg) translateX(1px) translateY(-1px);
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25));
            transition: transform 0.22s ease, filter 0.22s ease;
        }
        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(78,49,146,0.55), 0 0 24px rgba(6,182,212,0.3);
        }
        .send-btn:hover:not(:disabled)::after { opacity: 1; transform: scale(1); }
        .send-btn:hover:not(:disabled) img { transform: rotate(-6deg) translateX(3px) translateY(-2px); animation: sendTakeoff 1s ease-in-out infinite; }
        .send-btn:active:not(:disabled) { transform: translateY(0) scale(0.96); }
        .send-btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(6,182,212,0.32), 0 10px 24px rgba(31,18,63,0.45);
        }
        .send-btn:disabled {
            cursor: not-allowed;
            opacity: 0.58;
            filter: grayscale(0.25);
            transform: none;
            box-shadow: 0 8px 18px rgba(31,18,63,0.26);
        }

        @keyframes fadeInUpLeft {
            from { opacity: 0; transform: translate(-8px, 16px) scale(0.98); }
            to { opacity: 1; transform: translate(0, 0) scale(1); }
        }
        @keyframes fadeInUpRight {
            from { opacity: 0; transform: translate(8px, 16px) scale(0.98); }
            to { opacity: 1; transform: translate(0, 0) scale(1); }
        }
        @keyframes assistantPulse { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
        @keyframes dotBounce { 0%,80%,100% { transform: translateY(0); opacity:0.75; } 40% { transform: translateY(-4px); opacity:1; } }
        @keyframes pulseGlow { 0%,100% { box-shadow: 0 10px 24px rgba(139,92,246,0.35); } 50% { box-shadow: 0 12px 28px rgba(236,72,153,0.58); } }
        @keyframes sendTakeoff {
            0%, 100% { transform: rotate(-6deg) translateX(3px) translateY(-2px); }
            50% { transform: rotate(-4deg) translateX(5px) translateY(-4px); }
        }
        @keyframes streamingPulse {
            0%, 100% {
                box-shadow: 0 0 24px rgba(139,92,246,0.25),
                            0 0 48px rgba(139,92,246,0.08);
            }
            50% {
                box-shadow: 0 0 36px rgba(139,92,246,0.4),
                            0 0 64px rgba(6,182,212,0.15);
            }
        }
        @keyframes streamingShine {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.08); }
        }

        /* ========= 右侧新面板 ========= */
        .right-panel {
            flex: 1.2; min-width: 380px; max-width: 720px;
            align-self: stretch;
            height: min(calc(100vh - 30px), 820px);
            min-height: 0;
            display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .right-panel::-webkit-scrollbar { display: none; }
        .top-info-row,
        .bottom-tools-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            align-items: stretch;
        }
        .weather-dashboard,
        .advice-card,
        .search-panel,
        .food-panel {
            background: linear-gradient(130deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 20px;
            box-shadow: 0 24px 52px rgba(3,5,18,0.22);
        }
        .weather-dashboard {
            padding: 10px 12px;
        }
        .today-info {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 6px; padding-bottom: 6px;

                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${EMBEDDED_API_KEY}`
                    },
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    const data = await res.json();
                    const msg = data?.error?.message || `HTTP ${res.status}`;
                    onError(new Error(msg));
                    return;
                }
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullText = '';
                try {
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const raw = line.slice(6);
                                if (raw === '[DONE]') continue;
                                try {
                                    const obj = JSON.parse(raw);
                                    const content = obj?.choices?.[0]?.delta?.content;
                                    if (content) {
                                        fullText += content;
                                        onChunk(content);
                                    }
                                } catch (_) {}
                            }
                        }
                    }
                    onDone(fullText.trim());
                } catch (err) {
                    onError(err instanceof Error ? err : new Error(String(err)));
                }
            }

            // ---------- 初始化日期 & 天气显示 (高德天气) ----------
            function initDateWeather() {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2,'0');
                const day = String(now.getDate()).padStart(2,'0');
                const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
                const weekday = weekdays[now.getDay()];
                dateDisplay.innerHTML = `<span class="day">${day}</span><span class="month">${month}月</span><div class="weekday">${weekday}</div>`;

                currDesc.innerText = '加载中...';

            /** 根据天气数据更新穿搭建议 */
            function updateAdviceByWeather(temp, forecasts) {
                if (temp == null) return;
                let outfit = '';
                if (temp < 15) outfit = '🧥 建议穿厚外套、毛衣，注意保暖。';
                else if (temp < 22) outfit = '🧥 薄外套 + 长袖，早晚较凉。';
                else outfit = '👕 短袖/薄衫，但夜晚可能降温，带一件薄外套。';
                const hasRain = (forecasts || []).slice(0, 3).some(f =>
                    (f.dayWeather && f.dayWeather.includes('雨')) || (f.nightWeather && f.nightWeather.includes('雨'))
                );
                const rainAdvice = hasRain ? '☔ 未来三天有雨，记得带伞！' : '☀️ 近期少雨，适合观演。';
                adviceContent.innerHTML = `🎤 演唱会穿搭：${outfit}<br>📌 观演提醒：提前1-2小时到场，避免拥堵。${rainAdvice} 保持手机电量，享受音乐！`;
            }

            /** 使用高德天气：优先走代理 /api/amap-weather（稳定），失败则尝试 JS API Weather */
            async function fetchAmapWeather(cityName, locationLabel, adcode) {
                const city = cityName || '天津';
                if (weatherLocationEl && locationLabel) weatherLocationEl.textContent = locationLabel;

                const renderLive = (live) => {
                    if (!live) { currTemp.innerText = '--°'; currDesc.innerText = '暂无天气'; return; }
                    const temp = live.temperature != null ? live.temperature : '--';
                    currTemp.innerText = temp + '°';
                    currDesc.innerText = live.weather || '--';
                    if (weatherIconEl) weatherIconEl.className = weatherToIcon(live.weather || '');
                    const tempNum = Number(temp);
                    updateAdviceByWeather(Number.isFinite(tempNum) ? tempNum : null, null);
                };
                const renderForecast = (list) => {
                    if (!list || !list.length) return;
                    const html = list.slice(0, 5).map(f => {
                        const day = f.week || f.date || '';
                        const tempStr = `${f.dayTemp ?? '-'}/${f.nightTemp ?? '-'}°`;
                        const desc = f.dayWeather || f.nightWeather || '-';
                        return `<div class="forecast-row"><span class="forecast-day">${day}</span><span class="forecast-icon"><i class="${weatherToIcon(desc)}"></i></span><span class="forecast-temp">${tempStr}</span><span class="forecast-desc">${desc}</span></div>`;
                    }).join('');
                    weeklyForecast.innerHTML = html;
                    const dayTempNum = Number(list[0]?.dayTemp);
                    updateAdviceByWeather(Number.isFinite(dayTempNum) ? dayTempNum : null, list);
                };

                try {
                    const q = adcode ? `adcode=${encodeURIComponent(adcode)}` : `city=${encodeURIComponent(city)}`;
                    const res = await fetch(API_BASE + `/api/amap-weather?${q}`);
                    const data = await res.json();
                    if (data.ok) {
                        if (data.live) renderLive(data.live);
                        if (data.forecasts && data.forecasts.length) renderForecast(data.forecasts);
                        return;
                    }
                    currDesc.innerText = data.error || '天气接口异常';
                } catch (e) {
                    currDesc.innerText = getApiErrorMessage(e, '天气');
                }
                if (AMapLib && AMapLib.Weather) {
                    try {
                        const weather = new AMapLib.Weather();
                        weather.getLive(city, (err, live) => { if (!err && live) renderLive(live); });
                        weather.getForecast(city, (err, forecast) => {
                            if (!err && forecast) {
                                const list = forecast.forecasts || forecast.forecast || [];
                                if (list.length) renderForecast(list);
                            }
                        });
                    } catch (e) { console.warn('AMap.Weather 异常', e); }
                }
            }

            // ---------- 代理 API 基址 (file:// 时需指定 localhost) ----------
            const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';
            function getApiErrorMessage(e, type) {
                const msg = e && e.message ? String(e.message) : '';
                if (/Failed to fetch|NetworkError|Load failed/i.test(msg) || msg === '') {
                    return '请通过 http://localhost:3001 打开页面并确保已执行 cd server && npm start 启动代理';
                }
                return (type ? type + '：' : '') + (msg || '请求失败');
            }

            // ---------- 高德地图初始化与导航 (使用loader) ----------
            let map = null;
            let AMapLib = null;
            let destMarker = null;
            let currentPosition = null; // { lng, lat, address }
            let destinationPoint = null; // { lng, lat, name }
            let placeSearch = null;
            let placeSearchFood = null; // 仅用于周边美食 searchNearBy，不绑 map/panel
            let routeService = null;

            function formatDistance(meter) {
                const m = Number(meter);
                if (!Number.isFinite(m) || m <= 0) return '--';
                if (m >= 1000) return `${(m / 1000).toFixed(1)}km`;
                return `${Math.round(m)}m`;
            }

            function setDestinationPoint(point) {
                if (!point || point.lng == null || point.lat == null) return;
                destinationPoint = { lng: Number(point.lng), lat: Number(point.lat), name: point.name || '目的地' };
                if (destMarker) {
                    destMarker.setPosition([destinationPoint.lng, destinationPoint.lat]);
                    destMarker.setTitle(destinationPoint.name);
                }
            }
            function extractLngLat(location) {
                if (!location) return null;
                if (typeof location.getLng === 'function' && typeof location.getLat === 'function') {
                    const lng = Number(location.getLng());
                    const lat = Number(location.getLat());
                    if (Number.isFinite(lng) && Number.isFinite(lat)) return { lng, lat };
                }
                const lng = Number(location.lng);
                const lat = Number(location.lat);
                if (Number.isFinite(lng) && Number.isFinite(lat)) return { lng, lat };
                return null;
            }

            function fetchNearbyFood(point, radius = 1500) {
                if (!foodListEl) return;
                if (!point || point.lng == null || point.lat == null) {
                    foodListEl.innerHTML = '<div class="nav-addr">请先搜索有效目的地。</div>';
                    return;
                }
                foodListEl.innerHTML = '<div class="nav-addr">正在获取周边美食...</div>';
                if (foodHintEl) foodHintEl.textContent = `范围：${point.name || '目的地'}附近 ${radius} 米`;
                if (!placeSearchFood) {
                    foodListEl.innerHTML = '<div class="nav-addr">地图加载中，请稍后再试。</div>';
                    return;
                }
                placeSearchFood.searchNearBy('美食', [point.lng, point.lat], radius, function(status, result) {
                    if (status !== 'complete' || !result || !result.poiList || !result.poiList.pois || !result.poiList.pois.length) {
                        foodListEl.innerHTML = '<div class="nav-addr">附近暂无推荐美食，可尝试扩大范围或更换目的地。</div>';
                        return;
                    }
                    const pois = result.poiList.pois;
                    const list = pois.map(function(poi) {
                        const loc = extractLngLat(poi.location);
                        const rating = (poi.biz_ext && poi.biz_ext.rating) ? String(poi.biz_ext.rating) : '';
                        const businessArea = poi.business_area || poi.adname || '';
                        return {
                            name: poi.name || '未命名餐厅',
                            address: poi.address || '暂无地址',
                            distance: poi.distance != null ? Number(poi.distance) : 0,
                            rating: rating,
                            businessArea: businessArea,
                            lng: loc ? loc.lng : null,
                            lat: loc ? loc.lat : null
                        };
                    });
                    list.sort(function(a, b) { return (Number(b.rating) || 0) - (Number(a.rating) || 0); });
                    foodListEl.innerHTML = list.map(function(item) {
                        const ratingStr = item.rating ? '评分 ' + item.rating : '暂无评分';
                        const distanceStr = item.distance ? formatDistance(item.distance) : '--';
                        const business = item.businessArea ? ' · ' + item.businessArea : '';
                        const safeName = escapeHtml(item.name);
                        const safeAddr = escapeHtml(item.address);
                        const lng = item.lng != null ? item.lng : '';
                        const lat = item.lat != null ? item.lat : '';
                        return '<div class="food-item">' +
                            '<div class="food-item-head">' +
                            '<div><div class="food-name">' + safeName + '</div><div class="food-meta">' + ratingStr + ' · 距离 ' + distanceStr + business + '</div></div>' +
                            '<button class="food-route-btn" data-lng="' + lng + '" data-lat="' + lat + '" data-name="' + safeName + '" type="button">去这里</button>' +
                            '</div><div class="food-addr">' + safeAddr + '</div></div>';
                    }).join('');
                });
            }

            async function fetchConfig() {
                try {
                    const res = await fetch(API_BASE + '/api/config');
                    if (res.ok) {
                        const data = await res.json();
                        if (data.amapJsKey) AMAP_KEY = data.amapJsKey;
                        if (data.amapSecurityJsCode) AMAP_SECURITY_JS_CODE = data.amapSecurityJsCode;
                    }
                } catch (_) {}
            }

            async function applyLocatedPoint(lng, lat) {
                const el = document.getElementById('currentAddrInput');
                if (!el) return;
                try {
                    const res = await fetch(API_BASE + `/api/regeo?location=${lng},${lat}`);
                    const data = await res.json();
                    if (data.ok && data.address) {
                        currentPosition = { lng, lat, address: data.address };
                        el.value = data.address;
                        const ac = data.addressComponent || {};
                        const cityVal = Array.isArray(ac.city) ? ac.city[0] : ac.city;
                        const cityForWeather = (cityVal && String(cityVal).trim()) ? cityVal : (ac.province || '天津市');
                        const district = ac.district || '';
                        const label = district ? `${(ac.province||'').replace(/[省市]/g,'')} · ${district}` : (cityForWeather || '天津');
                        fetchAmapWeather(cityForWeather, label, ac.adcode || null);
                        return;
                    }
                    el.placeholder = data.error || '逆地理解析失败';
                } catch (e) {
                    el.placeholder = getApiErrorMessage(e, '定位');
                }
                currentPosition = { lng, lat, address: '当前位置' };
                el.value = `经度 ${lng.toFixed(4)}, 纬度 ${lat.toFixed(4)}`;
            }

            function getLocateErrorMsg(err) {
                if (!err) return '定位失败，请重试';
                if (err.code === 1) return '定位被拒绝，请允许浏览器定位权限';
                if (err.code === 2) return '定位不可用，请检查网络/GPS';
                if (err.code === 3) return '定位超时，请重试';
                return '定位失败，请重试';
            }

            function fetchCurrentAddress() {
                const el = document.getElementById('currentAddrInput');
                if (!el) return;
                const resetPlaceholder = () => { el.placeholder = '如：南开大学（不填默认南开大学）'; };
                const markLocating = () => {
                    el.value = '';
                    el.placeholder = '定位中...';
                };
                const markLocateError = (msg) => {
                    el.value = '';
                    el.placeholder = msg;
                };

                const tryAmapGeolocation = () => {
                    if (!AMapLib || !map) return Promise.reject(new Error('高德定位不可用'));
                    return new Promise((resolve, reject) => {
                        AMapLib.plugin(['AMap.Geolocation'], () => {
                            const geolocation = new AMapLib.Geolocation({
                                enableHighAccuracy: true,
                                timeout: 10000
                            });
                            geolocation.getCurrentPosition((status, result) => {
                                if (status === 'complete' && result?.position) {
                                    const p = result.position;
                                    const lng = Number(typeof p.getLng === 'function' ? p.getLng() : p.lng);
                                    const lat = Number(typeof p.getLat === 'function' ? p.getLat() : p.lat);
                                    if (Number.isFinite(lng) && Number.isFinite(lat)) {
                                        resolve({ lng, lat });
                                        return;
                                    }
                                }
                                reject(new Error('高德定位失败'));
                            });
                        });
                    });
                };

                markLocating();
                if (!navigator.geolocation) {
                    tryAmapGeolocation()
                        .then(async (pos) => {
                            await applyLocatedPoint(pos.lng, pos.lat);
                            resetPlaceholder();
                        })
                        .catch(() => markLocateError('浏览器不支持定位，请手动输入地址'));
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        await applyLocatedPoint(pos.coords.longitude, pos.coords.latitude);
                        resetPlaceholder();
                    },
                    async (err) => {
                        try {
                            const amapPos = await tryAmapGeolocation();
                            await applyLocatedPoint(amapPos.lng, amapPos.lat);
                            resetPlaceholder();
                        } catch (_) {
                            markLocateError(getLocateErrorMsg(err));
                        }
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }

            function searchDest() {
                const keyword = document.getElementById('destInput').value.trim() || '天津奥林匹克中心';
                if (!map || !placeSearch) return;
                const searchWrap = document.getElementById('searchResultWrap');
                const searchPanel = document.getElementById('placeSearchPanel');
                if (searchWrap && searchPanel) {
                    searchWrap.style.display = 'block';
                    searchPanel.innerHTML = '<div class="nav-addr">搜索中...</div>';
                }
                placeSearch.search(keyword, (status, result) => {
                    if (status !== 'complete' && status !== 'no_data') {
                        console.warn('PlaceSearch 失败', result);
                        if (searchPanel) searchPanel.innerHTML = '<div class="nav-addr">搜索失败，请稍后重试</div>';
                    }
                    if (status === 'no_data') {
                        if (searchPanel) searchPanel.innerHTML = '<div class="nav-addr">未找到相关地点</div>';
                    }
                    if (status === 'complete') {
                        const pois = result?.poiList?.pois || [];
                        const first = pois[0];
                        if (first?.location) {
                            const point = extractLngLat(first.location);
                            if (!point) {
                                geocodeAddress(keyword).then((geo) => {
                                    if (!geo) return;
                                    setDestinationPoint(geo);
                                    fetchNearbyFood(destinationPoint);
                                });
                                return;
                            }
                            setDestinationPoint({
                                lng: point.lng,
                                lat: point.lat,
                                name: first.name || keyword
                            });
                            fetchNearbyFood(destinationPoint);
                        } else {
                            geocodeAddress(keyword).then((geo) => {
                                if (!geo) return;
                                setDestinationPoint(geo);
                                fetchNearbyFood(destinationPoint);
                            });
                        }
                    }
                });
            }

            /** 解析「经度 x, 纬度 y」格式，或返回 null */
            function parseLngLatFromDisplay(str) {
                if (!str || typeof str !== 'string') return null;
                const m = str.match(/经度\s*([-\d.]+)\s*[,，]\s*纬度\s*([-\d.]+)/);
                if (m) return { lng: parseFloat(m[1]), lat: parseFloat(m[2]), name: str };
                return null;
            }

            async function geocodeAddress(addr) {
                const res = await fetch(API_BASE + `/api/geocode?address=${encodeURIComponent(addr)}&city=天津`);
                const data = await res.json();
                if (!data.ok || !data.locationArr) return null;
                return { lng: data.locationArr[0], lat: data.locationArr[1], name: data.address || addr };
            }

            /** 解析起点：优先当前定位经纬度，其次「经度,纬度」字符串，否则地理编码 */
            async function resolveFromPoint(fromAddr) {
                if (currentPosition && currentPosition.lng != null && currentPosition.lat != null)
                    return { lng: currentPosition.lng, lat: currentPosition.lat, name: currentPosition.address || fromAddr };
                const parsed = parseLngLatFromDisplay(fromAddr);
                if (parsed) return parsed;
                return await geocodeAddress(fromAddr || '南开大学');
            }

            async function resolveDestinationPoint() {
                if (destinationPoint && destinationPoint.lng != null && destinationPoint.lat != null) return destinationPoint;
                const toAddr = document.getElementById('destInput').value.trim() || '天津奥林匹克中心';
                const parsed = parseLngLatFromDisplay(toAddr);
                if (parsed) {
                    setDestinationPoint(parsed);
                    return destinationPoint;
                }
                const geo = await geocodeAddress(toAddr);
                if (geo) setDestinationPoint(geo);
                return destinationPoint;
            }

            async function searchRoute(mode, customDestination) {
                const fromAddr = document.getElementById('currentAddrInput')?.value.trim() || '南开大学';
                if (!map || !AMapLib) return;
                const routeWrap = document.getElementById('routeResultWrap');
                const routePanelEl = document.getElementById('routePanel');
                if (routeWrap && routePanelEl) {
                    routeWrap.style.display = 'block';
                    routePanelEl.innerHTML = '<div class="nav-addr">路线规划中...</div>';
                }
                const callback = (status, result) => {
                    if (status === 'complete') {
                        if (routeWrap) routeWrap.style.display = 'block';
                    } else if (status === 'no_data' || status === 'error') {
                        if (routePanelEl) routePanelEl.innerHTML = '<div class="nav-addr">未找到路线，请检查起终点是否在天津范围内</div>';
                    }
                };

                try {
                    const fromPoint = await resolveFromPoint(fromAddr);
                    const toPoint = customDestination || await resolveDestinationPoint();
                    if (!fromPoint || !toPoint) {
                        if (routePanelEl) routePanelEl.innerHTML = '<div class="nav-addr">起点或终点解析失败，请重试或更换地址</div>';
                        return;
                    }
                    const startLngLat = [fromPoint.lng, fromPoint.lat];
                    const endLngLat = [toPoint.lng, toPoint.lat];

                    if (routeService && typeof routeService.clear === 'function') {
                        routeService.clear();
                    }

                    const pluginMap = {
                        car: 'AMap.Driving',
                        walk: 'AMap.Walking',
                        ride: 'AMap.Riding',
                        transit: 'AMap.Transfer'
                    };
                    const pluginName = pluginMap[mode] || 'AMap.Driving';
                    AMapLib.plugin([pluginName], function() {
                        if (mode === 'car') {
                            routeService = new AMapLib.Driving({ map, panel: 'routePanel' });
                        } else if (mode === 'walk') {
                            routeService = new AMapLib.Walking({ map, panel: 'routePanel' });
                        } else if (mode === 'ride') {
                            routeService = new AMapLib.Riding({ map, panel: 'routePanel' });
                        } else {
                            routeService = new AMapLib.Transfer({ map, panel: 'routePanel', city: '天津' });
                        }
                        routeService.search(startLngLat, endLngLat, callback);
                    });
                } catch (e) {
                    if (routePanelEl) routePanelEl.innerHTML = '<div class="nav-addr">路线规划失败，请稍后重试</div>';
                }
            }

            // ---------- 聊天功能 (原框架精简版) ----------
            function scrollToBottom() {
                messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
            }
            function escapeHtml(raw) { return String(raw).replace(/[&<>"]/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]; }); }
            function renderMarkdown(text) { return '<p>' + escapeHtml(text).replace(/\n/g, '<br>') + '</p>'; } // 极简

            /** 解析助手回复中的【选项】块，返回 { mainText, options } 或 null */
            function parseAgentOptions(text) {
                const match = text.match(/^([\s\S]*?)【选项】\s*\n([\s\S]+)$/);
                if (!match) return null;
                const mainText = match[1].trim();
                const lines = match[2].trim().split(/\n/).map(function(s) {
                    return s.replace(/^\d+[\.\、]\s*/, '').trim();
                }).filter(Boolean);
                if (lines.length >= 4) return { mainText: mainText, options: lines.slice(0, 4) };
                return null;
            }

            /** 在气泡内渲染选项按钮并绑定点击（含涟漪） */
            function renderAgentOptionsInBubble(bubble, options, onSelect) {
                const wrap = document.createElement('div');
                wrap.className = 'agent-options';
                options.forEach(function(opt) {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'agent-option-btn';
                    btn.textContent = opt;
                    btn.dataset.option = opt;
                    btn.addEventListener('click', function(e) {
                        if (btn.disabled) return;
                        createBurstEffect(btn, e);
                        wrap.querySelectorAll('.agent-option-btn').forEach(function(b) { b.disabled = true; });
                        onSelect(opt);
                    });
                    wrap.appendChild(btn);
                });
                bubble.appendChild(wrap);
            }

            /** 唯美爆开特效：从点击位置向外迸发多颗粒子 */
            function createBurstEffect(btn, e) {
                const rect = btn.getBoundingClientRect();
                const cx = e.clientX - rect.left;
                const cy = e.clientY - rect.top;
                const count = 14;
                const radius = 70;
                for (var i = 0; i < count; i++) {
                    var angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
                    var dist = radius * (0.85 + Math.random() * 0.3);
                    var tx = Math.cos(angle) * dist;
                    var ty = Math.sin(angle) * dist;
                    var p = document.createElement('span');
                    p.className = 'burst-particle';
                    p.style.left = cx + 'px';
                    p.style.top = cy + 'px';
                    p.style.setProperty('--tx', tx + 'px');
                    p.style.setProperty('--ty', ty + 'px');
                    p.style.animation = 'burstOut 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards';
                    btn.appendChild(p);
                    setTimeout(function(el) { if (el.parentNode) el.remove(); }, 750, p);
                }
            }

            function addMessage(role, content) {
                const row = document.createElement('div'); row.className = 'msg-row ' + role;
                const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
                if (role === 'assistant' && agentMode) {
                    const parsed = parseAgentOptions(content);
                    if (parsed) {
                        bubble.innerHTML = renderMarkdown(parsed.mainText);
                        renderAgentOptionsInBubble(bubble, parsed.options, function(opt) {
                            sendUserMessage(opt);
                        });
                    } else {
                        bubble.innerHTML = renderMarkdown(content);
                    }
                } else {
                    bubble.innerHTML = renderMarkdown(content);
                }
                row.appendChild(bubble); messagesEl.appendChild(row); scrollToBottom();
            }

            /** 创建空助手气泡，用于流式输出 */
            function createStreamingBubble() {
                const row = document.createElement('div');
                row.className = 'msg-row assistant';
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble streaming';
                bubble.innerHTML = '<div class="stream-content"></div><span class="typing-cursor"><img src="荧光棒.png" alt="" /></span>';
                row.appendChild(bubble);
                messagesEl.appendChild(row);
                scrollToBottom();
                return { row, bubble, contentEl: bubble.querySelector('.stream-content'), cursorEl: bubble.querySelector('.typing-cursor') };
            }

            // 流式输出节奏：每 58ms 揭示 1 个字符，营造舒缓打字感
            const REVEAL_INTERVAL_MS = 58;
            const CHARS_PER_TICK = 1;

            /** 更新流式气泡内容（内联渲染，无 p 包裹以配合光标） */
            function updateStreamingBubble({ contentEl }, text) {
                contentEl.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
                scrollToBottom();
            }

            /**
             * 带节奏的揭示：从 buffer 中按 REVEAL_INTERVAL_MS 逐字显示到 contentEl
             * @param {HTMLElement} contentEl
             * @param {() => string} getBuffer
             * @param {{ onComplete?: ()=>void, isDone?: ()=>boolean }} opts 流结束且揭示完成时调用 onComplete
             * @returns {() => void} 返回 clear 函数
             */
            function startTypedReveal(contentEl, getBuffer, opts = {}) {
                const { onComplete, isDone } = opts;
                let lastDisplayed = 0;
                const tick = () => {
                    const buf = getBuffer();
                    if (lastDisplayed < buf.length) {
                        lastDisplayed = Math.min(lastDisplayed + CHARS_PER_TICK, buf.length);
                        const shown = buf.slice(0, lastDisplayed);
                        contentEl.innerHTML = escapeHtml(shown).replace(/\n/g, '<br>');
                        scrollToBottom();
                    }
                    if (isDone?.() && lastDisplayed >= buf.length && onComplete) {
                        clearInterval(id);
                        onComplete();
                    }
                };
                const id = setInterval(tick, REVEAL_INTERVAL_MS);
                tick();
                return () => clearInterval(id);
            }

            /** 结束流式，移除光标和 streaming 类 */
            function finishStreamingBubble({ bubble, cursorEl }) {
                cursorEl?.remove();
                bubble?.classList.remove('streaming');
            }

            function addTypingIndicator() {
                const row = document.createElement('div'); row.className = 'msg-row assistant'; row.id = 'typingRow';
                const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
                bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
                row.appendChild(bubble); messagesEl.appendChild(row); scrollToBottom();
            }
            function removeTypingIndicator() { document.getElementById('typingRow')?.remove(); }
            function setInteractionDisabled(disabled) {
                waitingResponse = disabled; userInputEl.disabled = disabled; sendBtnEl.disabled = disabled;
                quickPanelEl.querySelectorAll('.quick-btn').forEach(b => b.disabled = disabled);
            }

            async function sendUserMessage(content) {
                const text = content.trim();
                if (!text || waitingResponse) return;
                addMessage('user', text);
                conversationHistory.push({ role: 'user', content: text });
                setInteractionDisabled(true);
                addTypingIndicator();

                let streamingState = null;
                let accumulatedText = '';
                let isStreamDone = false;
                let clearReveal = null;

                const onFirstChunk = () => {
                    if (!streamingState) {
                        removeTypingIndicator();
                        streamingState = createStreamingBubble();
                        clearReveal = startTypedReveal(streamingState.contentEl, () => accumulatedText, {
                            isDone: () => isStreamDone,
                            onComplete: () => {
                                const finalText = accumulatedText;
                                finishStreamingBubble(streamingState);
                                const parsed = agentMode ? parseAgentOptions(finalText) : null;
                                if (parsed) {
                                    streamingState.contentEl.innerHTML = renderMarkdown(parsed.mainText);
                                    renderAgentOptionsInBubble(streamingState.bubble, parsed.options, function(opt) {
                                        sendUserMessage(opt);
                                    });
                                }
                                conversationHistory.push({ role: 'assistant', content: finalText });
                                setInteractionDisabled(false);
                                userInputEl.focus();
                            }
                        });
                    }
                };

                requestAssistantReplyStream({
                    onChunk: (chunk) => {
                        onFirstChunk();
                        accumulatedText += chunk;
                    },
                    onDone: (fullText) => {
                        onFirstChunk();
                        accumulatedText = (fullText || accumulatedText) || '';
                        isStreamDone = true;
                    },
                    onError: (e) => {
                        clearReveal?.();
                        removeTypingIndicator();
                        addMessage('assistant', `出错：${e.message}`);
                        setInteractionDisabled(false);
                        userInputEl.focus();
                    }
                });
            }

            function updateAgentModeUI() {
                if (agentMode) {
                    quickPanelEl.style.display = 'none';
                    if (agentModeBtnEl) agentModeBtnEl.classList.add('active');
                } else {
                    quickPanelEl.style.display = 'flex';
                    if (agentModeBtnEl) agentModeBtnEl.classList.remove('active');
                }
            }

            function resetAgentConversation() {
                messagesEl.innerHTML = '';
                conversationHistory = [
                    { role: 'user', content: '你好，请先向我问好并简要介绍你能如何帮助我选演唱会，然后以一句疑问句结尾，再给出四个选项供我选择。' }
                ];
                setInteractionDisabled(true);
                addTypingIndicator();
                let streamingState = null;
                let accumulatedText = '';
                let isStreamDone = false;
                let clearReveal = null;
                const onFirstChunk = function() {
                    if (!streamingState) {
                        removeTypingIndicator();
                        streamingState = createStreamingBubble();
                        clearReveal = startTypedReveal(streamingState.contentEl, function() { return accumulatedText; }, {
                            isDone: function() { return isStreamDone; },
                            onComplete: function() {
                                const finalText = accumulatedText;
                                finishStreamingBubble(streamingState);
                                const parsed = parseAgentOptions(finalText);
                                if (parsed) {
                                    streamingState.contentEl.innerHTML = renderMarkdown(parsed.mainText);
                                    renderAgentOptionsInBubble(streamingState.bubble, parsed.options, function(opt) {
                                        sendUserMessage(opt);
                                    });
                                }
                                conversationHistory.push({ role: 'assistant', content: finalText });
                                setInteractionDisabled(false);
                                userInputEl.focus();
                            }
                        });
                    }
                };
                requestAssistantReplyStream({
                    onChunk: function(chunk) {
                        onFirstChunk();
                        accumulatedText += chunk;
                    },
                    onDone: function(fullText) {
                        onFirstChunk();
                        accumulatedText = (fullText || accumulatedText) || '';
                        isStreamDone = true;
                    },
                    onError: function(e) {
                        clearReveal && clearReveal();
                        removeTypingIndicator();
                        addMessage('assistant', '出错：' + e.message);
                        setInteractionDisabled(false);
                        userInputEl.focus();
                    }
                });
            }

            function resetConversation() {
                messagesEl.innerHTML = '';
                if (agentMode) {
                    resetAgentConversation();
                    return;
                }
                conversationHistory = [
                    { role: 'user', content: '你好，请先向我问好并简要介绍你能如何帮助我选演唱会。' }
                ];
                setInteractionDisabled(true);
                addTypingIndicator();
                let streamingState = null;
                let accumulatedText = '';
                let isStreamDone = false;
                let clearReveal = null;
                const onFirstChunk = () => {
                    if (!streamingState) {
                        removeTypingIndicator();
                        streamingState = createStreamingBubble();
                        clearReveal = startTypedReveal(streamingState.contentEl, () => accumulatedText, {
                            isDone: () => isStreamDone,
                            onComplete: () => {
                                const finalText = accumulatedText;
                                finishStreamingBubble(streamingState);
                                conversationHistory.push({ role: 'assistant', content: finalText });
                                setInteractionDisabled(false);
                            }
                        });
                    }
                };
                requestAssistantReplyStream({
                    onChunk: (chunk) => {
                        onFirstChunk();
                        accumulatedText += chunk;
                    },
                    onDone: (fullText) => {
                        onFirstChunk();
                        accumulatedText = (fullText || accumulatedText) || '';
                        isStreamDone = true;
                    },
                    onError: (e) => {
                        clearReveal?.();
                        removeTypingIndicator();
                        conversationHistory = [];
                        addMessage('assistant', '你好！我是小星，你的天津演唱会向导。请告诉我你的年龄、音乐偏好、预算或演唱会经验，我来给你推荐～');
                        setInteractionDisabled(false);
                    }
                });
            }

            // 事件绑定
            composerEl.addEventListener('submit', (e) => { e.preventDefault(); sendUserMessage(userInputEl.value); userInputEl.value = ''; });
            quickPanelEl.addEventListener('click', (e) => { const btn = e.target.closest('.quick-btn'); if(btn && btn.dataset.quick) sendUserMessage(btn.dataset.quick); });
            if (agentModeBtnEl) {
                agentModeBtnEl.addEventListener('click', () => {
                    agentMode = !agentMode;
                    updateAgentModeUI();
                    resetConversation();
                });
            }
            resetBtnEl.addEventListener('click', () => resetConversation());

            // 头像点击：小星可爱地摇摇头
            const avatarWrapEl = document.getElementById('avatarWrap');
            if (avatarWrapEl) {
                function triggerAvatarShake() {
                    avatarWrapEl.classList.remove('avatar-shake');
                    void avatarWrapEl.offsetWidth;
                    avatarWrapEl.classList.add('avatar-shake');
                }
                avatarWrapEl.addEventListener('click', triggerAvatarShake);
                avatarWrapEl.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); triggerAvatarShake(); } });
                avatarWrapEl.addEventListener('animationend', (e) => {
                    if (e.target === avatarWrapEl.querySelector('img')) avatarWrapEl.classList.remove('avatar-shake');
                });
            }

            // 导航面板事件
            document.getElementById('searchDestBtn')?.addEventListener('click', searchDest);
            document.getElementById('locateBtn')?.addEventListener('click', fetchCurrentAddress);
            document.getElementById('navWalkBtn')?.addEventListener('click', () => searchRoute('walk'));
            document.getElementById('navDriveBtn')?.addEventListener('click', () => searchRoute('car'));
            document.getElementById('navRideBtn')?.addEventListener('click', () => searchRoute('ride'));
            document.getElementById('navTransitBtn')?.addEventListener('click', () => searchRoute('transit'));
            document.getElementById('refreshFoodBtn')?.addEventListener('click', async () => {
                const point = await resolveDestinationPoint();
                fetchNearbyFood(point);
            });
            foodListEl?.addEventListener('click', (e) => {
                const btn = e.target.closest('.food-route-btn');
                if (!btn) return;
                const lng = Number(btn.dataset.lng);
                const lat = Number(btn.dataset.lat);
                if (!Number.isFinite(lng) || !Number.isFinite(lat)) return;
                const name = btn.dataset.name || '目标餐厅';
                searchRoute('car', { lng, lat, name });
            });

            // 初始化所有
            initDateWeather();
            initAmap();
            resetConversation(); // 调用 API 获取模型欢迎语

            // 附加：模拟动态更新天气建议 (每秒不用，已静态)
            // 如果需要真实墨迹天气API，可在此fetch并更新，但因跨域和key问题，此处保留mock。
            // 参考搜索到的墨迹天气API格式 [citation:2][citation:6]
        })();
    </script>
</body>
